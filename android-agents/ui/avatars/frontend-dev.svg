<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="32" fill="#051525"/>

  <!-- Hair loopies — large dark loops hanging on each side of face -->
  <!-- Left loopy -->
  <circle cx="17" cy="36" r="9" fill="none" stroke="#1e3a5f" stroke-width="5"/>
  <!-- Right loopy -->
  <circle cx="47" cy="36" r="9" fill="none" stroke="#1e3a5f" stroke-width="5"/>
  <!-- Cut off top halves of loops so they emerge from head naturally -->
  <rect x="8"  y="18" width="18" height="18" fill="#051525"/>
  <rect x="38" y="18" width="18" height="18" fill="#051525"/>

  <!-- Hair top — dark cap -->
  <ellipse cx="32" cy="20" rx="13" ry="8" fill="#0c2340"/>

  <!-- Face -->
  <circle cx="32" cy="30" r="11" fill="#0e2a3f" stroke="#38bdf8" stroke-width="1.5"/>

  <!-- Water Tribe hair tie detail -->
  <rect x="13" y="27" width="4" height="4" rx="1" fill="#38bdf8" opacity="0.6"/>
  <rect x="47" y="27" width="4" height="4" rx="1" fill="#38bdf8" opacity="0.6"/>

  <!-- Eyes -->
  <circle cx="27.5" cy="29" r="2" fill="#38bdf8"/>
  <circle cx="36.5" cy="29" r="2" fill="#38bdf8"/>

  <!-- Warm smile -->
  <path d="M26 35 Q32 40 38 35" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
