<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="32" fill="#060c18"/>

  <!-- Boomerang shape: two curved arms at ~120 degrees -->
  <!-- Main body -->
  <path d="M10 50 Q8 36 20 26 Q30 18 38 20 Q32 24 26 30 Q16 40 18 54 Q14 56 10 50Z"
        fill="#334155" stroke="#94a3b8" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M38 20 Q50 18 56 26 Q58 36 52 44 Q48 50 44 48 Q50 40 48 32 Q44 24 38 20Z"
        fill="#334155" stroke="#94a3b8" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Silver highlight ridge — left arm -->
  <path d="M12 48 Q12 34 22 26 Q30 20 37 21"
        fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Silver highlight ridge — right arm -->
  <path d="M38 21 Q46 22 50 30 Q54 38 50 46"
        fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Blue edge accent — left arm -->
  <path d="M18 53 Q14 42 22 32 Q28 24 36 21"
        fill="none" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Blue edge accent — right arm -->
  <path d="M36 21 Q44 20 50 28 Q56 36 52 46"
        fill="none" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Center joint knot -->
  <circle cx="37" cy="21" r="3.5" fill="#60a5fa" opacity="0.9"/>
  <circle cx="37" cy="21" r="1.5" fill="#cbd5e1"/>
</svg>
